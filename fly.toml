# Fly.io config for PlantCart SaaS. Rename "plantcart" to your own app name.
# Secrets (PLANTCART_SECRET, ANTHROPIC_API_KEY) are set via `fly secrets set`, NOT here.
app = "plantcart"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  PLANTCART_ENV = "production"
  PLANTCART_PORT = "8123"
  PLANTCART_DB = "/data/plantcart.db"
  PLANTCART_LLM_PROVIDER = "anthropic"
  PLANTCART_LLM_MODEL = "claude-haiku-4-5-20251001"

# Persistent SQLite lives here. Create it once: `fly volumes create plantcart_data --size 1`
[mounts]
  source = "plantcart_data"
  destination = "/data"

[http_service]
  internal_port = 8123
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  # SQLite has a single writer — do not scale past one machine (see DEPLOY.md).
  [http_service.concurrency]
    type = "requests"
    hard_limit = 200
    soft_limit = 150

  [[http_service.checks]]
    method = "GET"
    path = "/health"
    interval = "30s"
    timeout = "5s"
    grace_period = "10s"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
