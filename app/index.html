<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="theme-color" content="#2f6f4f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/icon-192.png">
<title>PlantCart</title>
<style>
  :root {
    --green:#2f6f4f; --green-dark:#245840; --bg:#f6f7f4; --card:#fff;
    --text:#1d2b23; --muted:#7a8a80; --amber:#c77b1e; --red:#b3402e;
  }
  * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body { margin:0; height:100%; }
  body {
    font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Noto Sans JP",sans-serif;
    background:var(--bg); color:var(--text); display:flex; flex-direction:column;
    padding:env(safe-area-inset-top) env(safe-area-inset-right) 0 env(safe-area-inset-left);
  }
  header {
    background:var(--green); color:#fff; padding:12px 16px;
    display:flex; align-items:center; gap:10px; position:sticky; top:0; z-index:10;
  }
  header h1 { font-size:1.15rem; margin:0; flex:1; font-weight:700; }
  #pill {
    font-size:.72rem; font-weight:600; padding:4px 10px; border-radius:999px;
    background:#ffffff2b; color:#fff; white-space:nowrap;
  }
  #pill.synced::before  { content:"● "; color:#8ee6a1; }
  #pill.syncing::before { content:"● "; color:#ffd479; }
  #pill.offline::before { content:"● "; color:#ff9d8a; }
  form#add {
    display:flex; gap:8px; padding:12px 16px; background:var(--card);
    border-bottom:1px solid #e3e7e0; position:sticky; top:48px; z-index:9;
  }
  #cands {
    position:absolute; top:100%; left:12px; right:12px; background:var(--card);
    border:1px solid #dde4dc; border-top:none; border-radius:0 0 14px 14px;
    box-shadow:0 8px 18px #00000022; display:none; max-height:46vh; overflow-y:auto;
  }
  .cand {
    display:flex; align-items:center; gap:10px; padding:12px 14px;
    border-bottom:1px solid #f0f3ee; cursor:pointer; font-size:.98rem;
  }
  .cand:last-child { border-bottom:none; }
  .cand:active { background:#eef5f0; }
  .cand .cat-tag { margin-left:auto; color:var(--muted); font-size:.74rem; white-space:nowrap; }
  #name {
    flex:1; font-size:1rem; padding:10px 12px; border:1.5px solid #d4dcd4;
    border-radius:10px; outline:none; min-width:0;
  }
  #name:focus { border-color:var(--green); }
  #qty { width:74px; font-size:.9rem; padding:10px 8px; border:1.5px solid #d4dcd4; border-radius:10px; outline:none; }
  button.add-btn {
    background:var(--green); color:#fff; border:none; border-radius:10px;
    font-size:1.3rem; width:46px; flex-shrink:0; cursor:pointer;
  }
  button.add-btn:active { background:var(--green-dark); }
  main { flex:1; overflow-y:auto; padding:8px 12px 90px; }
  .cat { font-size:.72rem; font-weight:700; letter-spacing:.08em; text-transform:uppercase;
         color:var(--muted); margin:14px 6px 6px; }
  ul#list { list-style:none; margin:0; padding:0; }
  li.item {
    position:relative; overflow:hidden; border-radius:12px; margin-bottom:8px;
    box-shadow:0 1px 2px #0000000a; user-select:none; -webkit-user-select:none;
    cursor:pointer; touch-action:pan-y;   /* vertical scroll native, horizontal = swipe */
  }
  li.item .under {
    position:absolute; inset:0; display:flex; align-items:center;
    font-weight:700; font-size:.95rem; opacity:0; padding:0 18px;
  }
  li.item .under.right { background:#dff3e4; color:var(--green-dark); justify-content:flex-start; }
  li.item .under.left  { background:#fdf3e3; color:var(--amber); justify-content:flex-end; }
  li.item .row {
    position:relative; background:var(--card); border-radius:12px;
    display:flex; align-items:center; gap:12px; padding:13px 14px;
  }
  li.item.pending .row { opacity:.55; }
  li.item .box {
    width:22px; height:22px; border:2px solid #b9c6bc; border-radius:7px; flex-shrink:0;
  }
  li.item .nm { flex:1; font-size:1.02rem; overflow-wrap:anywhere; }
  li.item .qty { color:var(--muted); font-size:.85rem; }
  li.item .who { color:var(--muted); font-size:.72rem; }
  #empty { text-align:center; color:var(--muted); margin-top:48px; font-size:.95rem; }
  #toast {
    position:fixed; left:50%; bottom:24px; transform:translateX(-50%);
    background:#243b2f; color:#fff; padding:12px 16px; border-radius:12px;
    display:none; align-items:center; gap:14px; font-size:.92rem; z-index:20;
    box-shadow:0 4px 14px #00000040; max-width:92vw;
  }
  #toast button {
    background:none; border:none; color:#8ee6a1; font-weight:700; font-size:.92rem;
    cursor:pointer; padding:4px;
  }
  #sheet {
    position:fixed; inset:0; background:#0007; display:none; z-index:30;
    align-items:flex-end;
  }
  #sheet .card {
    background:var(--card); width:100%; border-radius:18px 18px 0 0; padding:20px 18px
      calc(20px + env(safe-area-inset-bottom));
  }
  #sheet h2 { margin:0 0 4px; font-size:1.05rem; }
  #sheet p { margin:0 0 16px; color:var(--muted); font-size:.88rem; }
  #sheet button {
    width:100%; padding:14px; border-radius:12px; border:none; font-size:1rem;
    font-weight:600; margin-bottom:10px; cursor:pointer;
  }
  #sheet .skip { background:#fdf3e3; color:var(--amber); }
  #sheet .danger { background:#fbe9e5; color:var(--red); }
  #sheet .cancel { background:#eef1ec; color:var(--text); }
  #namedlg {
    position:fixed; inset:0; background:var(--bg); z-index:40; display:none;
    flex-direction:column; align-items:center; justify-content:center; gap:14px; padding:24px;
  }
  #namedlg input { font-size:1.1rem; padding:12px 14px; border:1.5px solid #d4dcd4;
    border-radius:10px; width:min(320px,90vw); text-align:center; }
  #namedlg button { background:var(--green); color:#fff; border:none; border-radius:10px;
    padding:12px 28px; font-size:1rem; font-weight:600; cursor:pointer; }
  #auth {
    position:fixed; inset:0; background:var(--bg); z-index:50; display:none;
    align-items:center; justify-content:center; padding:24px;
  }
  .auth-card { width:min(360px,92vw); display:flex; flex-direction:column; gap:11px; }
  .auth-card h1 { text-align:center; color:var(--green); margin:0 0 2px; }
  #auth-tagline { text-align:center; color:var(--muted); margin:0 0 8px; font-size:.9rem; }
  .auth-card input { font-size:1rem; padding:12px 14px; border:1.5px solid #d4dcd4;
    border-radius:10px; outline:none; }
  .auth-card input:focus { border-color:var(--green); }
  .auth-card #au-go { background:var(--green); color:#fff; border:none; border-radius:10px;
    padding:13px; font-size:1rem; font-weight:700; cursor:pointer; margin-top:4px; }
  .auth-switch { text-align:center; font-size:.85rem; color:var(--muted); margin-top:6px; }
  .auth-switch a { color:var(--green-dark); cursor:pointer; text-decoration:underline; }
  .auth-err { color:var(--red); font-size:.85rem; text-align:center; min-height:1em; }
  #auth.mode-login #au-name, #auth.mode-login #au-code,
  #auth.mode-join #au-name, #auth.mode-join #au-email, #auth.mode-join #au-pass,
  #auth.mode-register #au-code { display:none; }
  #settings { position:fixed; inset:0; background:#0007; display:none; z-index:45;
    align-items:flex-end; }
  #settings .card { background:var(--card); width:100%; border-radius:18px 18px 0 0;
    padding:20px 18px calc(20px + env(safe-area-inset-bottom)); }
  #settings h2 { margin:0 0 12px; font-size:1.05rem; }
  #settings button { width:100%; padding:13px; border-radius:12px; border:none;
    font-size:1rem; font-weight:600; margin-bottom:10px; cursor:pointer; }
  #settings .cancel { background:#eef1ec; color:var(--text); }
  #settings .danger { background:#fbe9e5; color:var(--red); }
  .set-row { display:flex; justify-content:space-between; align-items:center; margin-bottom:4px; }
  .invite { font-family:ui-monospace,monospace; font-size:1.3rem; letter-spacing:.15em;
    color:var(--green-dark); }
  .set-hint { color:var(--muted); font-size:.8rem; margin:0 0 14px; }
  #set-code { font-size:1rem; padding:11px; border:1.5px solid #d4dcd4; border-radius:10px;
    width:100%; margin-bottom:10px; text-transform:uppercase; }
  #settingsBtn { background:#ffffff2b; border:none; color:#fff; font-size:1rem;
    padding:5px 9px; border-radius:999px; cursor:pointer; }
  #tray { padding:10px 12px 0; display:none; }
  #tray .tray-label { font-size:.72rem; font-weight:700; letter-spacing:.08em;
    text-transform:uppercase; color:var(--muted); margin:0 6px 6px; }
  .chip {
    display:inline-flex; align-items:center; gap:7px; background:#e9f5ec;
    border:1.5px dashed #9ec7ab; color:var(--green-dark); border-radius:999px;
    padding:7px 6px 7px 13px; margin:0 6px 6px 0; font-size:.92rem; cursor:pointer;
    user-select:none; -webkit-user-select:none;
  }
  .chip .lbl { font-size:.7rem; color:var(--muted); }
  .chip .snz {
    border:none; background:#d3e8d9; color:var(--green-dark); border-radius:999px;
    width:22px; height:22px; font-size:.8rem; line-height:1; cursor:pointer; padding:0;
  }
  #plants, #lang {
    background:#ffffff2b; border:none; color:#fff; font-size:.8rem; font-weight:700;
    padding:5px 10px; border-radius:999px; cursor:pointer; white-space:nowrap;
  }
  .cand .alt { color:var(--muted); font-size:.8rem; }
  #ideas {
    position:fixed; inset:0; background:var(--bg); z-index:35; display:none;
    flex-direction:column;
  }
  #ideas header { position:static; }
  #ideas .body { flex:1; overflow-y:auto; padding:14px 16px 40px; }
  #ideas h3 { font-size:.78rem; letter-spacing:.08em; text-transform:uppercase;
    color:var(--muted); margin:18px 2px 8px; }
  .pchip { display:inline-block; background:#e9f5ec; color:var(--green-dark);
    border-radius:999px; padding:5px 12px; margin:0 5px 6px 0; font-size:.85rem; }
  .pchip.new { background:#fff; border:1.5px dashed #9ec7ab; cursor:pointer; }
  .recipe { background:var(--card); border-radius:14px; padding:14px 15px;
    margin-bottom:10px; box-shadow:0 1px 2px #0000000a; }
  .recipe b { font-size:1rem; }
  .recipe .row { font-size:.85rem; margin-top:6px; color:var(--muted);
    overflow-wrap:anywhere; }
  .recipe .np { color:var(--green-dark); font-weight:600; }
  .recipe button { margin-top:10px; background:var(--green); color:#fff; border:none;
    border-radius:9px; padding:9px 14px; font-size:.86rem; font-weight:600; cursor:pointer; }
  #ideas .status { text-align:center; color:var(--muted); margin:40px 12px; font-size:.92rem; }
  #ideas .topbtn { background:#ffffff2b; border:none; color:#fff; font-size:.8rem;
    font-weight:700; padding:5px 12px; border-radius:999px; cursor:pointer; }
  #tray .tray-label { cursor:pointer; }
  #tray .tray-label::after { content:' ▸'; color:var(--green); }
  .chip.more { background:#eef1ec; border-style:solid; border-color:#d4dcd4; color:var(--muted); }
  #cyc { position:fixed; inset:0; background:var(--bg); z-index:35; display:none;
         flex-direction:column; }
  #cyc header { position:static; }
  #cyc .body { flex:1; overflow-y:auto; padding:14px 16px 40px; }
  #cyc h3 { font-size:.78rem; letter-spacing:.08em; text-transform:uppercase;
            color:var(--muted); margin:18px 2px 8px; }
  #cyc .topbtn { background:#ffffff2b; border:none; color:#fff; font-size:.8rem;
    font-weight:700; padding:5px 12px; border-radius:999px; cursor:pointer; }
  .cycrow { background:var(--card); border-radius:12px; padding:12px 14px; margin-bottom:8px;
            display:flex; align-items:center; gap:10px; box-shadow:0 1px 2px #0000000a; }
  .cycrow.due { border-left:4px solid var(--green); cursor:pointer; }
  .cycrow .nm { flex:1; font-size:.98rem; overflow-wrap:anywhere; }
  .cycrow .meta { text-align:right; font-size:.74rem; color:var(--muted); line-height:1.5;
                  white-space:nowrap; }
  .cycrow .meta b { color:var(--green-dark); font-size:.8rem; }
  .cycrow .bar { height:4px; border-radius:2px; background:#e6ece6; margin-top:5px;
                 overflow:hidden; width:84px; }
  .cycrow .bar i { display:block; height:100%; background:var(--green); }
  .cycrow.over .bar i { background:var(--amber); }
  .cyc-note { color:var(--muted); font-size:.8rem; margin:20px 2px; }
</style>
</head>
<body>
<header>
  <h1>PlantCart</h1>
  <button id="lang">🌐 EN</button>
  <button id="plants">🌱 –/30</button>
  <button id="settingsBtn" aria-label="Account">⚙</button>
  <span id="pill" class="syncing">…</span>
</header>

<form id="add" autocomplete="off">
  <input id="name" placeholder="Add item… (牛乳, apples, …)" enterkeyhint="done">
  <input id="qty" placeholder="qty">
  <button class="add-btn" type="submit" aria-label="Add">＋</button>
  <div id="cands"></div>
</form>

<div id="tray">
  <div class="tray-label" id="tray-label" role="button"></div>
  <div id="chips"></div>
</div>

<div id="cyc">
  <header>
    <h1 id="cyc-h1"></h1>
    <button class="topbtn" id="cyc-close">✕</button>
  </header>
  <div class="body">
    <h3 id="cyc-due-h"></h3>
    <div id="cyc-due"></div>
    <h3 id="cyc-all-h"></h3>
    <div id="cyc-all"></div>
    <p class="cyc-note" id="cyc-note"></p>
  </div>
</div>

<main>
  <ul id="list"></ul>
  <div id="empty" hidden></div>
</main>

<div id="toast"><span id="toastmsg"></span><button id="undo">UNDO</button></div>

<div id="sheet"><div class="card">
  <h2 id="sheet-title"></h2>
  <p id="sheet-note"></p>
  <button class="skip" id="sheet-skip"></button>
  <button class="danger" id="sheet-remove"></button>
  <button class="cancel" id="sheet-cancel"></button>
</div></div>

<div id="ideas">
  <header>
    <h1 id="ideas-h1"></h1>
    <button class="topbtn" id="ideas-refresh"></button>
    <button class="topbtn" id="ideas-close">✕</button>
  </header>
  <div class="body">
    <h3 id="week-title"></h3>
    <div id="week-plants"></div>
    <h3 id="recipes-h"></h3>
    <div id="recipes"><div class="status">…</div></div>
    <h3 id="try-h"></h3>
    <div id="diversity"></div>
  </div>
</div>

<div id="namedlg">
  <h2 id="namedlg-h"></h2>
  <input id="myname" maxlength="20">
  <button id="namego"></button>
</div>

<div id="auth">
  <div class="auth-card">
    <h1>🌱 PlantCart</h1>
    <p id="auth-tagline"></p>
    <div id="auth-err" class="auth-err"></div>
    <input id="au-name" placeholder="Name" maxlength="40">
    <input id="au-email" type="email" placeholder="Email" autocomplete="email">
    <input id="au-pass" type="password" placeholder="Password (min 8)" autocomplete="current-password">
    <input id="au-code" placeholder="Invite code (to join a partner)" maxlength="12">
    <button id="au-go"></button>
    <div class="auth-switch">
      <a id="au-to-login"></a> · <a id="au-to-register"></a> · <a id="au-to-join"></a>
    </div>
  </div>
</div>

<div id="settings">
  <div class="card">
    <h2 id="set-h"></h2>
    <div class="set-row"><span id="set-invite-label"></span>
      <b id="set-invite" class="invite"></b></div>
    <p id="set-invite-hint" class="set-hint"></p>
    <button class="cancel" id="set-join"></button>
    <button class="cancel" id="set-logout"></button>
    <button class="danger" id="set-delete"></button>
    <button class="cancel" id="set-close"></button>
  </div>
</div>

<script>
'use strict';
/* ============ state ============
 * base   — last full state from the server (source of truth)
 * queue  — pending ops not yet ACKed (persisted in localStorage; survives
 *          reloads and dead zones). View = queue applied on top of base.  */
const $ = id => document.getElementById(id);
/* crypto.randomUUID exists ONLY in secure contexts — on plain http:// it is
 * undefined and every add silently threw. getRandomValues works everywhere. */
const uuid = () => {
  if (crypto.randomUUID) return crypto.randomUUID();
  const b = crypto.getRandomValues(new Uint8Array(16));
  b[6] = (b[6] & 0x0f) | 0x40; b[8] = (b[8] & 0x3f) | 0x80;
  const h = [...b].map(x => x.toString(16).padStart(2, '0')).join('');
  return `${h.slice(0,8)}-${h.slice(8,12)}-${h.slice(12,16)}-${h.slice(16,20)}-${h.slice(20)}`;
};
const LS = { name:'pc_name', queue:'pc_queue', base:'pc_base', token:'pc_token', hh:'pc_hh', catalog:'pc_catalog' };

/* API base: same-origin for the web build; the native (Capacitor) build injects
 * window.PLANTCART_API_BASE = "https://your-host" so bundled assets hit the
 * hosted backend. WS derives from the same base. */
const API = (window.PLANTCART_API_BASE || '').replace(/\/$/, '');
let TOKEN = localStorage.getItem(LS.token) || '';
let household = JSON.parse(localStorage.getItem(LS.hh) || 'null');

let base  = JSON.parse(localStorage.getItem(LS.base)  || '{"revision":0,"items":[]}');
let queue = JSON.parse(localStorage.getItem(LS.queue) || '[]');
let actor = localStorage.getItem(LS.name) || '';
let flushing = false, ws = null, wsDelay = 1000, lastToast = null;

const saveQueue = () => localStorage.setItem(LS.queue, JSON.stringify(queue));
const saveBase  = () => localStorage.setItem(LS.base, JSON.stringify(base));

/* authed fetch wrapper: prefixes API base, attaches Bearer token, and on a 401
 * (expired / deleted account) drops to the login screen instead of looping. */
async function api(path, opts = {}) {
  const headers = { ...(opts.headers || {}) };
  if (opts.body) headers['Content-Type'] = 'application/json';
  if (TOKEN) headers['Authorization'] = 'Bearer ' + TOKEN;
  const res = await fetch(API + path, { ...opts, headers });
  if (res.status === 401 && TOKEN) { logout(); throw new Error('unauthorized'); }
  return res;
}

function setSession(tok, hh) {
  TOKEN = tok; household = hh;
  localStorage.setItem(LS.token, tok);
  localStorage.setItem(LS.hh, JSON.stringify(hh));
}
function logout() {
  TOKEN = ''; household = null;
  [LS.token, LS.hh, LS.base, LS.queue, LS.catalog].forEach(k => localStorage.removeItem(k));
  base = { revision:0, items:[] }; queue = [];
  if (ws) { try { ws.close(); } catch (_) {} ws = null; }
  showAuth();
}

/* canonical() twin of server db.canonical — NFKC fold handles full-width JP */
const canon = s => s.normalize('NFKC').toLowerCase().trim().replace(/\s+/g,' ');
/* search fold: canon + katakana→hiragana, so ミルク matches typed みるく */
const fold = s => canon(s).replace(/[ァ-ヶ]/g,
  ch => String.fromCharCode(ch.charCodeAt(0) - 0x60));

/* ============ i18n ============ */
const CATS = {  // category → [emoji, JA label, EN label]
  produce:['🥬','野菜・果物','Produce'], dairy:['🥛','乳製品・卵','Dairy & Eggs'],
  meat_fish:['🍖','肉・魚','Meat & Fish'], pantry:['🥫','調味料・乾物','Pantry'],
  bakery:['🍞','パン','Bakery'], frozen:['🧊','冷凍','Frozen'],
  drinks:['🥤','飲料','Drinks'], household:['🧻','日用品','Household'],
  other:['📦','その他','Other'],
};
const STR = {
  en: {
    add_ph:'Add item… (milk, eggs, apples …)', qty_ph:'qty', tray:'Suggested — probably due',
    empty:'List is empty — nice work 🎉', uncat:'📦 Uncategorized',
    sheet_note:'Neither counts as a purchase. Skipped items get suggested again tomorrow.',
    sheet_skip:'🚫 Out of stock — skip', sheet_remove:'Remove (added by mistake)', cancel:'Cancel',
    swipe_bought:'Bought', swipe_skip:'Skip',
    who:'Who are you?', name_ph:'Your name', start:'Start',
    synced:'synced', syncing:'syncing…', reconnect:'reconnecting…',
    offline:n=>`offline · ${n} pending`,
    ideas:'🌱 Plants & ideas', refresh:'↻ refresh',
    week:(n,t)=>`This week's plants — ${n} of ${t}`,
    recipes_h:'Recipes from what you have', try_h:'Plants to try — tap to add',
    asking:'Asking the kitchen brain… (~30 s)',
    no_recipes:'No recipes yet — buy a few things first.',
    llm_down:'Kitchen brain (DGX LLM) is unreachable — the list and sync still work fine.',
    none_yet:'none yet — plants count as you shop',
    uses:'Uses: ', missing:'Missing: ', add_missing:'＋ Add missing to list',
    added_btn:'✓ added', added:n=>`＋ ${n} added to list`,
    new_plants:(n,l)=>`+${n} new plants: ${l}`,
    auth_tagline:'Your shared shopping list', a_login:'Log in', a_register:'Create account',
    a_join:'Join a partner', a_to_login:'Log in', a_to_register:'Create account',
    a_to_join:'Have an invite code?', a_err_fields:'Please fill in the fields.',
    set_title:'Account & household', set_invite:'Invite code',
    set_invite_hint:'Share this code so your partner can join and see the same list.',
    set_join:'Join a different household', set_logout:'Log out',
    set_delete:'Delete my account', set_join_prompt:'Enter invite code:',
    set_delete_confirm:'Delete your account and data? This cannot be undone.',
    tray_more:n=>`+${n} more…`, cyc_title:'📊 Purchase cycles',
    cyc_due_h:'Due now — tap to add', cyc_all_h:'Everything the app is tracking',

/* ============ view = base + pending ops ============ */
function view() {
  let items = base.items.map(i => ({...i}));
  for (const op of queue) {
    if (op.type === 'add') {
      if (!items.some(i => canon(i.name) === canon(op.name)))
        items.push({ id:op.item_id, name:op.name, qty_note:op.qty_note||'',
                     added_by:op.actor, category:op.cat||null, pending:true });
    } else if (op.type === 'checkoff' || op.type === 'remove' || op.type === 'skip') {
      items = items.filter(i => i.id !== op.item_id);
    }
  }
  return items;
}

const TRAY_MAX = 5;

  const chips = $('chips');

    queue.filter(o => o.type === 'snooze').map(o => o.catalog_id));
  const all = (base.suggestions || []).filter(s =>
    !listed.has(canon(s.name)) && !pendingSnoozes.has(s.catalog_id));
  const sugg = all.slice(0, TRAY_MAX);

/* ============ gestures: tap=checkoff, long-press=remove sheet ============ */
function attachGestures(li, it) {
  /* Tap = click (down AND up on this item — a pointerup alone must never
   * check anything off; the candidates dropdown closing mid-tap used to leak
   * its pointerup onto the item underneath = ghost purchases).
   * Long-press = 500 ms hold with <12 px movement (any-jitter cancellation
   * made long-press unreachable on real phones).
   * Swipe right = ✓ bought (purchase event) · swipe left = 🚫 skip (no event,
   * re-suggested tomorrow) — same server ops as tap / sheet, different gesture. */
  let timer = null, longFired = false, armed = false, sx = 0, sy = 0;
  let swiping = false, dx = 0;
  const row = li.querySelector('.row'), under = li.querySelector('.under');
  const THRESH = () => Math.max(72, li.offsetWidth * 0.28);
  const disarm = () => { clearTimeout(timer); armed = false; };
  const springBack = () => {
    row.style.transition = 'transform .15s';
    row.style.transform = '';
    under.style.opacity = 0;
    setTimeout(() => row.style.transition = '', 160);
  };
  li.addEventListener('pointerdown', e => {
    armed = true; longFired = false; swiping = false; dx = 0;
    sx = e.clientX; sy = e.clientY;
    timer = setTimeout(() => { longFired = true; openSheet(it); }, 500);
  });
  li.addEventListener('pointermove', e => {
    dx = e.clientX - sx;
    const dy = e.clientY - sy;
    if (!swiping) {
      if (Math.abs(dx) > 12 && Math.abs(dx) > Math.abs(dy) && !longFired) {
        swiping = true; disarm();
        try { li.setPointerCapture(e.pointerId); } catch (_) {}
      } else if (Math.hypot(dx, dy) > 12) {
        disarm();  // vertical movement: scrolling, not a tap
      }
    }
    if (swiping) {
      row.style.transform = `translateX(${dx}px)`;
      under.className = 'under ' + (dx > 0 ? 'right' : 'left');
      under.textContent = dx > 0 ? '✓ ' + T().swipe_bought : T().swipe_skip + ' 🚫';
      under.style.opacity = Math.min(Math.abs(dx) / THRESH(), 1);
    }
  });
  li.addEventListener('pointercancel', () => { disarm(); if (swiping) springBack(); swiping = false; });
  li.addEventListener('pointerup', () => {
    clearTimeout(timer);
    if (!swiping) return;
    if (dx > THRESH())       checkoff(it);      // render() removes the row
    else if (dx < -THRESH()) skipItem(it);
    else                     springBack();
    swiping = false;
  });
  li.addEventListener('click', () => {
    if (armed && !longFired && !swiping) checkoff(it);
    armed = false;
  });
  li.addEventListener('contextmenu', e => e.preventDefault());
}

function skipItem(it) {

  // undo for a mis-swipe: put it straight back on the list

/* ============ ops ============ */
function enqueue(fields) {
  const op = { op_id: uuid(), actor, ...fields };
  queue.push(op); saveQueue(); render(); flush();
  return op;
}

function checkoff(it) {
  const op = enqueue({ type:'checkoff', item_id: it.id });
  showToast(`✓ ${disp(it)}`, () => {
    // undo: if the checkoff is still queued locally, just retract it;
    // otherwise ask the server to delete the purchase_event + restore.
    const qi = queue.findIndex(o => o.op_id === op.op_id);
    if (qi >= 0 && !op.sent) { queue.splice(qi,1); saveQueue(); render(); }
    else enqueue({ type:'undo_checkoff', target_op_id: op.op_id });
  });
}

function renderCands() {
  const q = fold($('name').value);
  const box = $('cands');
  if (!q) { hideCands(); return; }
  const listed = new Set(view().map(i => canon(i.name)));
  const hits = [];
  for (const c of catalog) {                    // catalog arrives most-bought-first
    if (listed.has(canon(c.name))) continue;
    let rank = null;
    for (const k of [c.name, ...(c.aliases || [])].map(fold)) {
      if (k.startsWith(q)) { rank = 0; break; }
      if (k.includes(q)) rank = 1;
    }
    if (rank !== null) hits.push([rank, c]);
  }
  hits.sort((a, b) => a[0] - b[0]);             // stable → buys order kept within rank
  box.innerHTML = '';
  for (const [, c] of hits.slice(0, 8)) {
    const div = document.createElement('div');
    div.className = 'cand';
    div.innerHTML = '<span></span><span></span><span class="alt"></span><span class="cat-tag"></span>';
    div.children[0].textContent = catEmoji(c.category);
    div.children[1].textContent = disp(c);
    div.children[2].textContent = dispAlt(c);
    div.children[3].textContent = c.category ? (CATS[c.category] || CATS.other)[lang==='ja'?1:2] : '';
    div.addEventListener('pointerdown', e => {
      e.preventDefault();                        // fires before blur → keyboard stays
      enqueue({ type:'add', name:c.name, qty_note:$('qty').value.trim(),
                item_id:uuid(), cat:c.category });
      $('name').value = ''; $('qty').value = '';
      hideCands();
      $('name').focus();
    });
    box.appendChild(div);
  }
  box.style.display = box.children.length ? 'block' : 'none';
}

/* ============ queue flush (sequential, idempotent server-side) ============ */
async function flush() {
  if (flushing) return;
  flushing = true;
  setPill();
  try {
    while (queue.length) {
      const op = queue[0];
      op.sent = true;
      const res = await api('/api/op', {
        method:'POST', body: JSON.stringify(op),
      });
      if (!res.ok && res.status < 500) { // rejected (422 etc.) — drop, don't wedge queue
        console.error('op rejected', op, await res.text());
        queue.shift(); saveQueue(); continue;
      }
      if (!res.ok) throw new Error('server ' + res.status);
      const body = await res.json();
      // dedupe remap: our optimistic uuid → the existing row's id
      if (op.type === 'add' && body.result?.deduped && body.result.item_id !== op.item_id)
        for (const q of queue) if (q.item_id === op.item_id) q.item_id = body.result.item_id;
      queue.shift(); saveQueue();
    }
    await resync();
  } catch (e) { /* offline — queue persists, retry on next trigger */ }
  flushing = false;
  setPill();
}

async function resync() {
  const res = await api('/api/state');
  if (res.ok) { base = await res.json(); saveBase(); render(); }
  loadCatalog();  // picks up new items + enrichment updates for candidates
}

/* ============ websocket (downstream-only) + reconnect ============ */
/* Auth: fetch a short-lived single-use ticket over authed HTTP, then hand it to
 * the WS handshake as ?ticket= (keeps the 30-day JWT out of the WS URL/logs). */
function wsBase() {
  const origin = API || location.origin;
  return origin.replace(/^http/, 'ws');
}
async function connectWS() {
  if (!TOKEN) return;
  if (ws && (ws.readyState === 0 || ws.readyState === 1)) return;
  let ticket;
  try {
    const r = await api('/api/ws-ticket', { method:'POST' });
    if (!r.ok) throw new Error('ticket ' + r.status);
    ticket = (await r.json()).ticket;
  } catch (e) { setTimeout(connectWS, wsDelay); return; }
  ws = new WebSocket(`${wsBase()}/ws?ticket=${encodeURIComponent(ticket)}`);
  ws.onopen = () => { wsDelay = 1000; setPill(); flush(); };
  ws.onmessage = ev => {
    base = JSON.parse(ev.data); saveBase(); render(); setPill();
  };
  ws.onclose = () => {
    setPill();
    setTimeout(connectWS, wsDelay);
    wsDelay = Math.min(wsDelay * 2, 15000);
  };
  ws.onerror = () => ws.close();
}

/* phone unlock / tab foreground / network back — the NORMAL in-store path */
const wake = () => { connectWS(); flush(); };
document.addEventListener('visibilitychange', () => { if (!document.hidden) wake(); });
window.addEventListener('online', wake);
window.addEventListener('pageshow', wake);

function setPill() {
  const pill = $('pill');
  const live = ws && ws.readyState === 1;
  if (live && !queue.length)      { pill.className='synced';  pill.textContent=T().synced; }
  else if (queue.length && !live) { pill.className='offline'; pill.textContent=T().offline(queue.length); }
  else if (queue.length)          { pill.className='syncing'; pill.textContent=T().syncing; }
  else                            { pill.className='offline'; pill.textContent=T().reconnect; }
}

async function loadIdeas(refresh) {
  const wp = $('week-plants');
  wp.innerHTML = (base.plants?.week || [])
    .map(() => '<span class="pchip"></span>').join('') || '<span class="pchip"></span>';
  [...wp.children].forEach((el, i) => {
    el.textContent = base.plants?.week?.[i] || T().none_yet;
  });
  $('week-title').textContent =
    T().week(base.plants?.count ?? 0, base.plants?.target ?? 30);

  $('recipes').innerHTML = `<div class="status">${T().asking}</div>`;
  $('diversity').innerHTML = '';
  try {
    const res = await api('/api/ideas' + (refresh ? '?refresh=1' : ''));
    if (!res.ok) throw new Error(res.status);
    const data = await res.json();

    $('recipes').innerHTML = '';
    for (const r of data.recipes) {
      const div = document.createElement('div');
      div.className = 'recipe';
      div.innerHTML = `<b></b><div class="row uses"></div><div class="row miss"></div>
                       <div class="row np"></div><button>＋ Add missing to list</button>`;
      div.querySelector('b').textContent = r.title;
      div.querySelector('.uses').textContent = T().uses + (r.uses || []).join(', ');
      div.querySelector('.miss').textContent = T().missing + (r.missing || []).join(', ');
      div.querySelector('.np').textContent =
        (r.new_plants || []).length ? T().new_plants(r.new_plants.length, r.new_plants.join(', ')) : '';
      const btn = div.querySelector('button');
      btn.textContent = T().add_missing;
      if ((r.missing || []).length)
        btn.onclick = () => { r.missing.forEach(addFromIdeas); btn.disabled = true; btn.textContent = T().added_btn; };
      else btn.remove();
      $('recipes').appendChild(div);
    }
    if (!data.recipes.length)
      $('recipes').innerHTML = `<div class="status">${T().no_recipes}</div>`;

    for (const s of data.diversity) {
      const chip = document.createElement('span');
      chip.className = 'pchip new';
      chip.textContent = `＋ ${s.buy}（${s.plant}）`;
      chip.onclick = () => { addFromIdeas(s.buy); chip.remove(); };
      $('diversity').appendChild(chip);
    }
  } catch (e) {
    $('recipes').innerHTML = `<div class="status">${T().llm_down}</div>`;
  }
}

/* ============ auth screen ============ */
let authMode = 'login';
function showAuth() {
  applyLang();
  setAuthMode(TOKEN ? 'login' : 'register');  // first-run users land on register
  $('auth').style.display = 'flex';
}
function setAuthMode(m) {
  authMode = m;
  $('auth').className = 'mode-' + m;
  $('auth').style.display = 'flex';
  $('auth-err').textContent = '';
  $('au-go').textContent = T()['a_' + m];
  $('au-to-login').textContent = m === 'login' ? '' : T().a_to_login;
  $('au-to-register').textContent = m === 'register' ? '' : T().a_to_register;
  $('au-to-join').textContent = m === 'join' ? '' : T().a_to_join;
}
$('au-to-login').onclick = () => setAuthMode('login');
$('au-to-register').onclick = () => setAuthMode('register');
$('au-to-join').onclick = () => setAuthMode('join');

$('au-go').onclick = async () => {
  const name = $('au-name').value.trim(), email = $('au-email').value.trim();
  const pass = $('au-pass').value, code = $('au-code').value.trim();
  $('auth-err').textContent = '';
  try {
    let path, body;
    if (authMode === 'register') {
      if (!email || pass.length < 8) return err(T().a_err_fields);
      path = '/api/auth/register'; body = { email, password: pass, display_name: name };
    } else if (authMode === 'login') {
      if (!email || !pass) return err(T().a_err_fields);
      path = '/api/auth/login'; body = { email, password: pass };
    } else {  // join: must already have a token (registered) OR log in first
      if (!code) return err(T().a_err_fields);
      if (!TOKEN) {  // join needs an account — register/login handled separately
        if (!email || pass.length < 8) return err(T().a_err_fields);
        const r0 = await fetch(API + '/api/auth/register', { method:'POST',
          headers:{'Content-Type':'application/json'},
          body: JSON.stringify({ email, password: pass, display_name: name }) });
        if (!r0.ok) return err((await r0.json()).detail || 'error');
        const d0 = await r0.json(); setSession(d0.token, d0.household);
      }
      const rj = await api('/api/households/join', { method:'POST',
        body: JSON.stringify({ invite_code: code }) });
      if (!rj.ok) return err((await rj.json()).detail || 'error');
      const dj = await rj.json();
      setSession(dj.token, dj.household); actor = name || actor; enterApp(); return;
    }
    const res = await fetch(API + path, { method:'POST',
      headers:{'Content-Type':'application/json'}, body: JSON.stringify(body) });
    if (!res.ok) return err((await res.json()).detail || 'error');
    const d = await res.json();
    setSession(d.token, d.household);
    actor = name || (d.household.members.find(m => m.user_id === d.user_id) || {}).display_name || '';
    if (actor) localStorage.setItem(LS.name, actor);
    enterApp();
  } catch (e) { err(String(e.message || e)); }
};
const err = m => { $('auth-err').textContent = m; };

/* ============ account / settings ============ */
$('settingsBtn').onclick = () => {
  $('set-h').textContent = T().set_title;
  $('set-invite-label').textContent = T().set_invite;
  $('set-invite').textContent = household ? household.invite_code : '——';
  $('set-invite-hint').textContent = T().set_invite_hint;
  $('set-join').textContent = T().set_join;
  $('set-logout').textContent = T().set_logout;
  $('set-delete').textContent = T().set_delete;
  $('set-close').textContent = T().cancel;
  $('settings').style.display = 'flex';
};
$('set-close').onclick = () => $('settings').style.display = 'none';
$('settings').onclick = e => { if (e.target === $('settings')) $('settings').style.display='none'; };
$('set-logout').onclick = () => { $('settings').style.display='none'; logout(); };
$('set-join').onclick = async () => {
  const code = (prompt(T().set_join_prompt) || '').trim();
  if (!code) return;
  const r = await api('/api/households/join', { method:'POST', body: JSON.stringify({ invite_code: code }) });
  if (!r.ok) { alert((await r.json()).detail || 'error'); return; }
  const d = await r.json(); setSession(d.token, d.household);
  $('settings').style.display='none';
  localStorage.removeItem(LS.base); base = { revision:0, items:[] };
  enterApp();
};
$('set-delete').onclick = async () => {
  if (!confirm(T().set_delete_confirm)) return;
  await api('/api/account/delete', { method:'POST' }).catch(()=>{});
  logout();
};

/* ============ boot ============ */
function enterApp() {
  $('auth').style.display = 'none';
  $('settings').style.display = 'none';
  applyLang();
  render();
  connectWS();
  flush();
  loadCatalog();
}
function boot() {
  applyLang();
  if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js');
  if (TOKEN) enterApp();      // returning user — cached token; a 401 will bounce to auth
  else showAuth();
}
boot();
</script>
