name: Build Android debug APK

# The DGX dev box is aarch64, which cannot run Android's x86-64 aapt2/zipalign.
# GitHub's ubuntu-latest runners are x86-64, so the APK is built here and
# published as a downloadable artifact. Trigger manually (Actions tab ->
# Run workflow) or on push to the mobile/ scaffold or this workflow.
on:
  push:
    branches: [ saas, main ]
    paths:
      - 'mobile/**'
      - 'app/**'
      - '.github/workflows/build-android.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK packages
        run: sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      - name: Install JS dependencies
        run: npm ci

      - name: Copy bundled web assets into www/
        run: npm run copy-web

      # The android/ native project is generated, not committed in this scaffold.
      # Add it on first run; a no-op if it has since been committed.
      - name: Add Android platform if missing
        run: |
          if [ ! -d android ]; then npx cap add android; fi

      - name: Capacitor sync (copy web assets + plugins into android/)
        run: npx cap sync android

      - name: Build debug APK
        working-directory: mobile/android
        run: ./gradlew assembleDebug --stacktrace

      - name: Verify APK exists
        working-directory: mobile/android
        run: |
          APK=app/build/outputs/apk/debug/app-debug.apk
          test -f "$APK" && ls -lh "$APK" || { echo "APK NOT PRODUCED"; exit 1; }

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: plantcart-debug
          path: mobile/android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
