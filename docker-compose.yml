# ThinCart SaaS — single container + a named volume for the SQLite DB.
# Copy .env.example to .env and fill it in before `docker compose up -d`.
services:
  thincart:
    build: .
    image: thincart:latest
    restart: unless-stopped
    env_file: .env
    environment:
      # Force the DB onto the mounted volume regardless of what .env says.
      THINCART_DB: /data/thincart.db
    ports:
      - "8123:8123"
    volumes:
      - thincart-data:/data
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8123/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  thincart-data:
